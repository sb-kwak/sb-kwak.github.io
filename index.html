<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="에스비의 프로페셔널 포트폴리오">
    <title>에스비 | SW개발자</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="에스비 홈">에스비<span>.</span></a>
      <nav aria-label="주요 메뉴">
        <a href="#profile">Profile</a>
        <a href="#games">Games</a>
      </nav>
    </header>

    <main id="top">
      <section id="profile" class="hero" aria-labelledby="profile-title">
        <div class="hero-copy">
          <p class="eyebrow">SOFTWARE DEVELOPER</p>
          <h1 id="profile-title">아이디어를 <em>명확한 경험</em>으로 만듭니다.</h1>
          <p class="intro">안녕하세요, 프로 에스비입니다. 사람에게 편하고 오래 쓰이는 소프트웨어를 고민합니다.</p>
          <a class="button" href="#games">Games 살펴보기 <span aria-hidden="true">↓</span></a>
        </div>
        <div class="avatar-frame">
          <img src="assets/esbi-avatar.png" alt="에스비의 일러스트 아바타">
        </div>
      </section>

      <section id="games" class="games-section" aria-labelledby="games-title">
        <div>
          <p class="eyebrow">PLAYGROUND</p>
          <h2 id="games-title">Games</h2>
          <p>잠시 쉬어갈 수 있는 작은 실험실입니다. 지렁이 게임이 곧 준비됩니다.</p>
        </div>
        <div class="game-placeholder" role="status" aria-live="polite">
          <span class="placeholder-dot" aria-hidden="true"></span>
          <span>게임 영역 준비 중</span>
        </div>
      </section>
    </main>

    <footer>
      <p>© <span id="current-year"></span> 에스비. Built with care.</p>
    </footer>
  </body>
</html>
